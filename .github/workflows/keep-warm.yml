name: Keep Render backend warm

# Render's free tier spins the API down after ~15 min idle, costing a ~50s
# cold start on the next request. This pings the service root every ~10 min
# so it stays awake and first-load clip searches are fast.
on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (UTC)
  workflow_dispatch: {} # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
            "https://framed-api-7joi.onrender.com/")
          echo "API responded with HTTP $code"
          # Don't fail the workflow on a cold-start timeout — the ping itself
          # still wakes the service even if this request is slow.
