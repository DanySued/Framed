services:
  - type: web
    name: framed-api
    runtime: docker
    rootDir: api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/backend
    envVars:
      - key: PORT
        value: 8000
      - key: DATA_DIR
        value: /data
      - key: MEDIA_DIR
        value: /media
      - key: DATABASE_URL
        fromDatabase:
          name: framed-db
          property: connectionString
      - key: PEXELS_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: framed-db
    plan: free
    region: oregon
