services:
  # Legacy FastAPI service (kept for reference, can be decommissioned)
  - type: web
    name: framed-api
    runtime: docker
    rootDir: api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/backend
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: framed-db
          property: connectionString
      - key: PEXELS_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  # Render background worker — FFmpeg job runner
  - type: worker
    name: framed-worker
    runtime: docker
    rootDir: worker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false   # set manually: Supabase connection string (Transaction mode port 6543)
      - key: SUPABASE_URL
        value: https://hhnxglovthqxansfafeo.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false

databases:
  - name: framed-db
    plan: free
    region: oregon
