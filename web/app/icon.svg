<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer frame body -->
  <rect x="2" y="2" width="28" height="28" rx="4" ry="4" fill="#0a0e1a"/>
  <!-- Inner cutout (the "window" of the frame) -->
  <rect x="7" y="7" width="18" height="18" rx="2" ry="2" fill="#060910"/>
  <!-- Top-left corner accent -->
  <path d="M7 11 L7 7 L11 7" stroke="#52d6c4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Top-right corner accent -->
  <path d="M21 7 L25 7 L25 11" stroke="#52d6c4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Bottom-left corner accent -->
  <path d="M7 21 L7 25 L11 25" stroke="#52d6c4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Bottom-right corner accent -->
  <path d="M21 25 L25 25 L25 21" stroke="#52d6c4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Center dot / focus point -->
  <circle cx="16" cy="16" r="1.5" fill="#52d6c4"/>
</svg>
